worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    map $http_x_request_id $effective_request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    map $http_x_client_country $effective_client_country {
        default $http_x_client_country;
        ""      "Unknown";
    }

    # Canonicalize supported scenario names. Unknown nonempty labels are kept
    # visible for analysis and are normalized by the backend service.
    map $http_x_scenario $effective_scenario {
        ~*^normal$       "normal";
        ~*^slow$         "slow";
        ~*^server_error$ "server_error";
        default          $http_x_scenario;
        ""               "normal";
    }

    upstream match_service_upstream {
        server match-service:8000;
    }

    upstream team_service_upstream {
        server team-service:8000;
    }

    upstream stadium_service_upstream {
        server stadium-service:8000;
    }

    log_format phase1_json escape=json
        '{"timestamp":"$time_iso8601",'
        '"request_id":"$effective_request_id",'
        '"client_ip":"$remote_addr",'
        '"client_country":"$effective_client_country",'
        '"scenario":"$effective_scenario",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"service":"$target_service",'
        '"status_code":$status,'
        '"request_time_sec":"$request_time",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/nginx_access.log phase1_json;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    server {
        listen 80;
        set $target_service "unknown";

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        location = /api/matches {
            set $target_service "match-service";
            proxy_pass http://match_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header X-Request-ID $effective_request_id;
            proxy_set_header X-Client-Country $effective_client_country;
            proxy_set_header X-Scenario $effective_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location = /api/teams {
            set $target_service "team-service";
            proxy_pass http://team_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header X-Request-ID $effective_request_id;
            proxy_set_header X-Client-Country $effective_client_country;
            proxy_set_header X-Scenario $effective_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location = /api/stadiums {
            set $target_service "stadium-service";
            proxy_pass http://stadium_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header X-Request-ID $effective_request_id;
            proxy_set_header X-Client-Country $effective_client_country;
            proxy_set_header X-Scenario $effective_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"route_not_found"}';
        }
    }
}
